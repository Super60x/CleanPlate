<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F8F0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#D5F5E3;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0D5C2E" flood-opacity="0.25"/>
    </filter>
    <radialGradient id="glassShine" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- NO background — transparent. Android provides backgroundColor separately -->

  <!-- Magnifying glass circle -->
  <circle cx="460" cy="420" r="195" fill="none" stroke="url(#glassGrad)" stroke-width="48" filter="url(#shadow)" />

  <!-- Glass shine -->
  <circle cx="460" cy="420" r="170" fill="url(#glassShine)" />

  <!-- Magnifying glass handle -->
  <line x1="600" y1="560" x2="720" y2="680" stroke="url(#glassGrad)" stroke-width="52" stroke-linecap="round" filter="url(#shadow)" />

  <!-- Leaf shape inside magnifying glass -->
  <path d="M460,280
           C520,280 560,320 560,370
           C560,440 520,490 460,530
           C400,490 360,440 360,370
           C360,320 400,280 460,280 Z"
        fill="url(#leafGrad)" filter="url(#shadow)" />

  <!-- Leaf vein (center) -->
  <line x1="460" y1="300" x2="460" y2="510" stroke="#2ECC71" stroke-width="5" stroke-linecap="round" opacity="0.6" />

  <!-- Leaf veins (left) -->
  <line x1="460" y1="370" x2="400" y2="340" stroke="#2ECC71" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  <line x1="460" y1="420" x2="390" y2="400" stroke="#2ECC71" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  <line x1="460" y1="465" x2="405" y2="455" stroke="#2ECC71" stroke-width="3" stroke-linecap="round" opacity="0.4" />

  <!-- Leaf veins (right) -->
  <line x1="460" y1="370" x2="520" y2="340" stroke="#2ECC71" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  <line x1="460" y1="420" x2="530" y2="400" stroke="#2ECC71" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  <line x1="460" y1="465" x2="515" y2="455" stroke="#2ECC71" stroke-width="3" stroke-linecap="round" opacity="0.4" />

  <!-- Small checkmark at bottom right -->
  <circle cx="680" cy="700" r="80" fill="#FFFFFF" filter="url(#shadow)" />
  <circle cx="680" cy="700" r="65" fill="#27AE60" />
  <polyline points="648,700 670,722 715,677" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
</svg>
